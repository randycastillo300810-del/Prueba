<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predicción de Deserción</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Predicción de Deserción</h1>
            <p>Universitaria · Escala 0-20</p>
        </header>

        <main>
            <!-- Formulario de entrada -->
            <div class="card">
                <h2>📊 Datos del Estudiante</h2>
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="promedio">Promedio de Notas (0-20):</label>
                        <input type="number" id="promedio" name="promedio" min="0" max="20" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="asistencia">Asistencia (%):</label>
                        <input type="number" id="asistencia" name="asistencia" min="0" max="100" required>
                    </div>

                    <div class="form-group">
                        <label for="materias_reprobadas">Materias Reprobadas:</label>
                        <input type="number" id="materias_reprobadas" name="materias_reprobadas" min="0" max="10" required>
                    </div>

                    <div class="form-group">
                        <label for="carga_alta">Carga Académica Alta:</label>
                        <select id="carga_alta" name="carga_alta">
                            <option value="0">No</option>
                            <option value="1">Sí</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="trabaja">¿Trabaja?:</label>
                        <select id="trabaja" name="trabaja">
                            <option value="0">No</option>
                            <option value="1">Sí</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">🔮 Predecir Riesgo</button>
                </form>
            </div>

            <!-- Resultado -->
            <div id="resultado" class="card" style="display:none;">
                <h2>📋 Resultado</h2>
                <div id="resultadoContent"></div>
            </div>

            <!-- Estado del servidor -->
            <div class="card status-card">
                <h3>💡 Estado del Sistema</h3>
                <p id="statusText">Verificando...</p>
            </div>
        </main>

        <footer>
            <p>Sistema de Predicción de Deserción Universitaria</p>
            <p>v1.0 · 100% Offline</p>
        </footer>
    </div>

    <script src="../static/js/app.js"></script>
</body>
</html>
