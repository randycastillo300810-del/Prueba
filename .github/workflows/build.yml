name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config
          pip install buildozer==1.5.0 cython==0.29.33
      
      - name: Build APK
        run: |
          # Crear el directorio tools/bin con symlink al sdkmanager real
          SDK_DIR=/home/runner/.buildozer/android/platform/android-sdk
          GH_SDK=/usr/local/lib/android/sdk
          
          # Copiar todo el SDK de GitHub
          mkdir -p $SDK_DIR
          cp -r $GH_SDK/* $SDK_DIR/
          
          # Crear el directorio que buildozer busca
          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/avdmanager $SDK_DIR/tools/bin/avdmanager
          
          # Verificar
          ls -la $SDK_DIR/tools/bin/
          
          # Compilar
          buildozer android debug
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: APK-Desercion
          path: bin/*.apk
