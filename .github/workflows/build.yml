name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config
          pip install buildozer==1.5.0 cython==0.29.33
      
      - name: Setup Android SDK properly
        run: |
          # Usar el Android SDK preinstalado de GitHub Actions
          ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          GH_SDK=/usr/local/lib/android/sdk
          
          mkdir -p $ANDROID_HOME
          cp -r $GH_SDK/* $ANDROID_HOME/
          
          # Verificar sdkmanager
          ls -la $ANDROID_HOME/cmdline-tools/latest/bin/ || echo "No sdkmanager"
          ls -la $ANDROID_HOME/tools/bin/ || echo "No tools"
          
          # Instalar build-tools y platform
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --install "build-tools;34.0.0" "platforms;android-33" "platform-tools"
      
      - name: Build APK
        run: |
          buildozer android debug
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: APK-Desercion
          path: bin/*.apk
