name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config expect
          pip install buildozer cython==0.29.33
      
      - name: Build APK
        run: |
          expect -c '
          spawn buildozer android debug
          expect {
              "Accept?" { send "y\r"; exp_continue }
              "y/N" { send "y\r"; exp_continue }
              eof
          }
          '
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Desercion
          path: bin/*.apk
